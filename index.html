<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature Flow Head Spa Piešťany</title>
  <meta name="description" content="Nature Flow Head Spa Piešťany – pokojný priestor pre uvoľnenie hlavy, šije a mysle. Luxusné head spa rituály, prírodná kozmetika a hlboký oddych." />
  <style>
    :root{
      --olive:#525234;
      --beige:#EDE8D0;
      --beige-2:#f6f2e2;
      --gold:#c9a14a;
      --gold-soft:rgba(201,161,74,.16);
      --text:#2f2f22;
      --line:rgba(82,82,52,.18);
      --shadow:0 18px 50px rgba(54,54,30,.12);
      --shadow-soft:0 10px 28px rgba(54,54,30,.08);
      --radius:24px;
      --container:min(1240px, calc(100% - 40px));
      --name-size:1.22rem;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"Georgia","Times New Roman",serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(201,161,74,.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(82,82,52,.08), transparent 34%),
        var(--beige);
      line-height:1.6;
    }

    img{max-width:100%;display:block}
    a{text-decoration:none;color:inherit}
    button,input,textarea,select{font:inherit}
    .container{width:var(--container);margin:0 auto}

    .site-header{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(14px);
      background:rgba(237,232,208,.78);
      border-bottom:1px solid rgba(82,82,52,.10);
    }

    .header-inner{
      width:var(--container);
      margin:0 auto;
      height:68px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:26px;
      padding:0;
      position:relative;
      overflow:visible;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:0;
      min-width:max-content;
      position:absolute;
      left:0;
      z-index:3;
      flex-shrink:0;
      height:68px;
    }

    .brand img{
      width:118px;
      height:118px;
      object-fit:contain;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.08));
      background:transparent;
      mix-blend-mode:multiply;
      margin-right:-12px;
      margin-top:0;
      flex-shrink:0;
    }

    .brand-text{
      display:flex;
      flex-direction:column;
      line-height:1;
      position:relative;
      z-index:1;
    }

    .brand-text strong{
      font-size:var(--name-size);
      letter-spacing:.04em;
      color:var(--olive);
      font-weight:700;
      white-space:nowrap;
    }

    .brand-text span{
      font-size:.68rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#8e7340;
      margin-top:5px;
      white-space:nowrap;
    }

    nav{
      position:static;
    }

    .nav-list{
      list-style:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:34px;
      padding:0;
      margin:0;
      flex-wrap:nowrap;
      white-space:nowrap;
    }

    .nav-list a{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 0;
      color:var(--olive);
      font-size:.88rem;
      letter-spacing:.02em;
      transition:color .32s ease, transform .32s ease;
    }

    .nav-list a::before{
      content:"";
      position:absolute;
      left:0;
      bottom:2px;
      width:0;
      height:2px;
      background:linear-gradient(90deg, #d8bb73 0%, #bf9132 40%, #efd99b 75%, #b7831f 100%);
      box-shadow:0 0 10px rgba(201,161,74,.28), 0 1px 0 rgba(255,242,198,.35);
      transition:width .34s ease;
      border-radius:999px;
    }

    .nav-list a:hover{
      color:#3d3d24;
      transform:translateY(-1px);
    }

    .nav-list a:hover::before{width:100%}

    .hero{
      width:100%;
      min-height:340px;
      padding:36px 0 30px;
      background:
        linear-gradient(115deg, rgba(10,10,10,.97) 0%, rgba(6,6,6,.985) 48%, rgba(18,16,10,.96) 100%);
      color:#e6ddc7;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      right:-120px;
      top:-120px;
      background:radial-gradient(circle, rgba(214,186,118,.35), transparent 70%);
      filter:blur(80px);
      animation:heroFloat1 18s ease-in-out infinite alternate;
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      left:30%;
      bottom:-160px;
      background:radial-gradient(circle, rgba(214,186,118,.25), transparent 70%);
      filter:blur(70px);
      animation:heroFloat2 22s ease-in-out infinite alternate;
      pointer-events:none;
    }

    @keyframes heroFloat1{
      0%{ transform:translate(0,0) scale(1); }
      100%{ transform:translate(-80px,40px) scale(1.2); }
    }

    @keyframes heroFloat2{
      0%{ transform:translate(0,0) scale(1); }
      100%{ transform:translate(100px,-60px) scale(1.3); }
    }

    .hero-gloss{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .hero-gloss span{
      position:absolute;
      display:block;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,236,190,.11), rgba(255,236,190,0));
      filter:blur(24px);
      animation:heroFloat 9s ease-in-out infinite alternate;
    }

    .hero-gloss span:nth-child(1){
      width:220px;
      height:220px;
      right:260px;
      top:110px;
    }

    .hero-gloss span:nth-child(2){
      width:160px;
      height:160px;
      right:460px;
      bottom:42px;
      animation-delay:1.8s;
    }

    .hero-gloss span:nth-child(3){
      width:120px;
      height:120px;
      right:560px;
      top:180px;
      animation-delay:3s;
    }

    @keyframes heroFloat{
      0%{ transform:translate3d(0,0,0) scale(1); }
      100%{ transform:translate3d(18px,-14px,0) scale(1.14); }
    }

    .hero-flow{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
      overflow:hidden;
    }

    .flow-layer{
      position:absolute;
      display:block;
      width:140%;
      height:180px;
      left:-20%;
      border-radius:45%;
      filter:blur(34px);
      opacity:.22;
      mix-blend-mode:screen;
    }

    .flow-1{
      top:18%;
      background:
        linear-gradient(
          90deg,
          rgba(201,161,74,0) 0%,
          rgba(201,161,74,.18) 20%,
          rgba(231,213,162,.28) 48%,
          rgba(201,161,74,.16) 72%,
          rgba(201,161,74,0) 100%
        );
      animation:waterFlow1 18s ease-in-out infinite alternate;
    }

    .flow-2{
      top:46%;
      background:
        linear-gradient(
          90deg,
          rgba(214,186,118,0) 0%,
          rgba(214,186,118,.12) 18%,
          rgba(246,226,177,.20) 50%,
          rgba(214,186,118,.10) 78%,
          rgba(214,186,118,0) 100%
        );
      filter:blur(42px);
      opacity:.18;
      animation:waterFlow2 24s ease-in-out infinite alternate;
    }

    .flow-3{
      top:68%;
      background:
        linear-gradient(
          90deg,
          rgba(201,161,74,0) 0%,
          rgba(201,161,74,.10) 24%,
          rgba(255,239,196,.16) 52%,
          rgba(201,161,74,.08) 76%,
          rgba(201,161,74,0) 100%
        );
      filter:blur(50px);
      opacity:.14;
      animation:waterFlow3 30s ease-in-out infinite alternate;
    }

    @keyframes waterFlow1{
      0%{ transform:translateX(-6%) translateY(0) skewX(-8deg) scaleX(1); }
      100%{ transform:translateX(6%) translateY(10px) skewX(-3deg) scaleX(1.08); }
    }

    @keyframes waterFlow2{
      0%{ transform:translateX(4%) translateY(0) skewX(7deg) scaleX(1); }
      100%{ transform:translateX(-5%) translateY(-12px) skewX(2deg) scaleX(1.06); }
    }

    @keyframes waterFlow3{
      0%{ transform:translateX(-3%) translateY(0) skewX(-6deg) scaleX(1); }
      100%{ transform:translateX(8%) translateY(8px) skewX(-1deg) scaleX(1.1); }
    }

    .hero-container{
      width:min(1280px, calc(100% - 120px));
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(360px, 620px) auto;
      align-items:center;
      justify-content:space-between;
      column-gap:84px;
      position:relative;
      z-index:2;
    }

    .hero-left{
      max-width:620px;
      justify-self:start;
    }

    .hero-title{
      margin:0 0 16px;
      font-size:12px !important;
      line-height:1.1 !important;
      letter-spacing:-.02em !important;
      font-weight:700;
      color:#ece1c7;
      white-space:nowrap;
    }

    .hero-text{
      max-width:420px;
    }

    .hero-text p{
      margin:0 0 12px;
      font-size:18px;
      line-height:1.7;
      color:#ddd0b0;
    }

    .hero-last{
      margin-top:14px !important;
      color:#cdbf9d;
    }

    .hero-right{
      justify-self:end;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .ritual-btn{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:300px;
      padding:16px 34px;
      font-size:14px;
      letter-spacing:1px;
      text-transform:uppercase;
      text-decoration:none;
      background:linear-gradient(135deg,#d4be86,#b5974f);
      color:#111;
      font-weight:700;
      border-radius:0;
      overflow:hidden;
      box-shadow:0 10px 28px rgba(200,170,100,.25);
      transition:transform .28s ease, box-shadow .28s ease;
    }

    .ritual-btn span{
      position:relative;
      z-index:2;
    }

    .ritual-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
        115deg,
        transparent 0%,
        rgba(255,255,255,.72) 49%,
        transparent 100%
      );
      transform:translateX(-135%);
      transition:transform .7s ease;
    }

    .ritual-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 36px rgba(200,170,100,.36);
    }

    .ritual-btn:hover::before{
      transform:translateX(135%);
    }

    .section{padding:90px 0}

    .section-title{
      margin:0 0 12px;
      font-size:var(--name-size);
      line-height:1.08;
      color:var(--olive);
      letter-spacing:.03em;
    }

    .section-subtitle{
      max-width:780px;
      margin:0;
      font-size:.87rem;
      color:rgba(47,47,34,.78);
    }

    .headspa-section{
      padding:42px 0 48px;
    }

    .headspa-shell{
      position:relative;
      width:100%;
      padding:34px 34px 28px;
      border-top:1px solid rgba(201,161,74,.22);
      border-bottom:1px solid rgba(201,161,74,.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
    }

    .headspa-shell::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, transparent 0%, rgba(201,161,74,.06) 18%, transparent 36%),
        radial-gradient(circle at 92% 18%, rgba(201,161,74,.08), transparent 20%);
    }

    .headspa-top{
      max-width:980px;
      position:relative;
      z-index:1;
    }

    .headspa-kicker,
    .rituals-kicker,
    .more-kicker,
    .visit-kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      background:rgba(201,161,74,.07);
      border:1px solid rgba(201,161,74,.14);
      color:#8a6b2b;
      font-size:.72rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .headspa-title,
    .more-title,
    .visit-title{
      margin:0 0 12px;
      font-size:var(--name-size);
      line-height:1.08;
      letter-spacing:.03em;
      color:var(--olive);
      text-transform:none;
    }

    .headspa-lead{
      max-width:980px;
      font-size:.86rem;
      line-height:1.75;
      color:rgba(47,47,34,.82);
      margin:0;
    }

    .headspa-grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:34px;
      margin-top:24px;
      align-items:start;
      position:relative;
      z-index:1;
    }

    .headspa-col{
      min-width:0;
    }

    .headspa-block{
      padding:0 0 18px;
      border-bottom:1px solid rgba(201,161,74,.16);
      margin-bottom:18px;
    }

    .headspa-block:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }

    .headspa-subtitle,
    .visit-card h3{
      margin:0 0 10px;
      font-size:.85rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#8a6b2b;
    }

    .headspa-text p{
      margin:0 0 12px;
      font-size:.85rem;
      line-height:1.7;
      color:rgba(47,47,34,.80);
    }

    .headspa-text p:last-child{
      margin-bottom:0;
    }

    .headspa-lines{
      display:grid;
      gap:12px;
      margin-top:4px;
    }

    .headspa-line,
    .visit-line{
      position:relative;
      padding-left:18px;
      font-size:.84rem;
      line-height:1.6;
      color:rgba(47,47,34,.78);
    }

    .headspa-line::before,
    .visit-line::before{
      content:"";
      position:absolute;
      left:0;
      top:.62em;
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(180deg,#d6b566,#b98b2c);
      box-shadow:0 0 0 4px rgba(185,139,44,.10);
    }

    .headspa-note{
      position:relative;
      padding:18px 18px 16px;
      border-radius:18px;
      background:rgba(82,82,52,.05);
      border:1px solid rgba(82,82,52,.09);
    }

    .headspa-note::before{
      content:"";
      position:absolute;
      left:0;
      top:18px;
      bottom:18px;
      width:3px;
      border-radius:999px;
      background:linear-gradient(180deg,#d6b566,#b98b2c);
    }

    .headspa-note-title{
      margin:0 0 10px;
      padding-left:12px;
      font-size:.9rem;
      color:var(--olive);
    }

    .headspa-note p{
      margin:0;
      padding-left:12px;
      font-size:.84rem;
      line-height:1.68;
      color:rgba(47,47,34,.78);
    }

    .section-divider{
      width:min(1240px, calc(100% - 40px));
      margin:8px auto 0;
      height:1px;
      background:linear-gradient(
        90deg,
        transparent 0%,
        rgba(201,161,74,.10) 12%,
        rgba(201,161,74,.28) 50%,
        rgba(201,161,74,.10) 88%,
        transparent 100%
      );
      position:relative;
    }

    .section-divider::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:120px;
      height:10px;
      background:radial-gradient(circle, rgba(201,161,74,.18), transparent 70%);
      filter:blur(8px);
    }

    .rituals-section{
      padding:42px 0 58px;
    }

    .rituals-head{
      margin-bottom:20px;
    }

    .rituals-subtitle{
      max-width:860px;
    }

    .rituals-intro{
      margin:8px 0 0;
      max-width:900px;
      font-size:.84rem;
      line-height:1.7;
      color:rgba(47,47,34,.74);
    }

    .rituals-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:14px;
      align-items:start;
    }

    .ritual-card{
      position:relative;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,.20));
      border:1px solid rgba(82,82,52,.10);
      box-shadow:
        0 10px 24px rgba(54,54,30,.05),
        inset 0 1px 0 rgba(255,255,255,.40);
      overflow:hidden;
      transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
    }

    .ritual-card::after,
    .more-shell::before,
    .visit-shell::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, transparent 0%, rgba(201,161,74,.04) 20%, transparent 42%),
        radial-gradient(circle at 88% 16%, rgba(201,161,74,.08), transparent 22%);
      opacity:.9;
    }

    .ritual-card:hover{
      transform:translateY(-3px);
      box-shadow:
        0 16px 34px rgba(54,54,30,.08),
        inset 0 1px 0 rgba(255,255,255,.46);
      border-color:rgba(185,139,44,.18);
    }

    .ritual-card.is-open{
      border-color:rgba(185,139,44,.24);
      box-shadow:
        0 18px 40px rgba(54,54,30,.10),
        0 0 0 1px rgba(201,161,74,.08),
        inset 0 1px 0 rgba(255,255,255,.48);
    }

    .ritual-card-inner{
      padding:18px 16px 16px;
      position:relative;
      z-index:2;
    }

    .ritual-card h3{
      margin:0 0 8px;
      font-size:var(--name-size);
      line-height:1.08;
      letter-spacing:.03em;
      color:var(--olive);
    }

    .ritual-short{
      margin:0 0 14px;
      font-size:.82rem;
      line-height:1.58;
      color:rgba(47,47,34,.78);
      min-height:72px;
    }

    .ritual-price-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:14px;
      white-space:nowrap;
    }

    .ritual-price-label{
      font-size:.72rem;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:rgba(47,47,34,.54);
      flex:0 0 auto;
    }

    .ritual-price-line{
      flex:1 1 auto;
      height:1px;
      background:linear-gradient(90deg, rgba(201,161,74,.22), rgba(82,82,52,.10));
      min-width:14px;
    }

    .ritual-price-value{
      display:inline-flex;
      align-items:center;
      color:#8a6b2b;
      font-size:.92rem;
      font-weight:700;
      letter-spacing:.01em;
      padding:0;
      border:none;
      background:none;
      min-height:auto;
    }

    .ritual-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      align-items:center;
    }

    .ritual-book-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 16px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      background:linear-gradient(135deg,#d4be86,#b5974f);
      color:#111;
      font-size:.76rem;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      box-shadow:0 8px 20px rgba(185,139,44,.18);
      transition:transform .24s ease, box-shadow .24s ease;
    }

    .ritual-book-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(185,139,44,.24);
    }

    .ritual-more-btn{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 16px;
      border:1px solid rgba(185,139,44,.18);
      border-radius:999px;
      cursor:pointer;
      background:rgba(255,255,255,.45);
      color:#6f5722;
      font-size:.76rem;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      box-shadow:0 8px 20px rgba(185,139,44,.08);
      transition:transform .24s ease, box-shadow .24s ease, background .24s ease;
    }

    .ritual-more-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(185,139,44,.14);
      background:rgba(255,255,255,.72);
    }

    .ritual-expand{
      display:grid;
      grid-template-rows:0fr;
      transition:grid-template-rows .34s ease;
    }

    .ritual-card.is-open .ritual-expand{
      grid-template-rows:1fr;
    }

    .ritual-expand > div{
      overflow:hidden;
    }

    .ritual-expand-content{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(201,161,74,.14);
    }

    .ritual-expand-grid{
      display:grid;
      gap:14px;
    }

    .ritual-expand-block h4{
      margin:0 0 8px;
      font-size:.72rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#8a6b2b;
    }

    .ritual-expand-block p{
      margin:0;
      font-size:.81rem;
      line-height:1.58;
      color:rgba(47,47,34,.78);
    }

    .ritual-expand-block ul{
      margin:0;
      padding:0;
      list-style:none;
      display:grid;
      gap:8px;
    }

    .ritual-expand-block li{
      position:relative;
      padding-left:14px;
      font-size:.8rem;
      line-height:1.54;
      color:rgba(47,47,34,.78);
    }

    .ritual-expand-block li::before{
      content:"";
      position:absolute;
      left:0;
      top:.62em;
      width:6px;
      height:6px;
      border-radius:50%;
